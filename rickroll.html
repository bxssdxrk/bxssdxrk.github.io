<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rickroll</title>
  <style>
    body {
      margin: 0;
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      width: 100%;
      flex-direction: column;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: auto;
      background-color: black;
    }

    #texto {
      color: white;
      font-size: 24px;
      margin-top: 20px;
      opacity: 0;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>

  <video id="video" src="video.mp4" autoplay loop></video>
  <div id="texto">Você foi rickrolled!</div>

  <script>
    const video = document.getElementById('video');
    const texto = document.getElementById('texto');

    // Volume máximo
    video.volume = 1.0;

    // Desmutar e garantir execução
    video.muted = false;
    video.play();

    // Mostrar texto após 1 segundo
    setTimeout(() => {
      texto.style.opacity = 1;
    }, 1000);
  </script>

</body>
</html>
