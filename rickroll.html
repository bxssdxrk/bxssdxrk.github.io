<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <style>
      body {
        margin: 0;
        background-color: black;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      video {
        width: 100%;
        height: auto;
      }

      #texto {
        color: white;
        font-size: 24px;
        margin-top: 20px;
        opacity: 0;
        transition: opacity 0.5s;
      }
    </style>
  </head>

  <body>
    <video id="video" autoplay loop>
      <source src="video.mp4" type="video/mp4">
      Seu navegador não suporta vídeos incorporados.
    </video>

    <div id="texto">Você foi rickrolled!</div>

    <script>
      const video = document.getElementById('video');
      const texto = document.getElementById('texto');

      // Força autoplay com som no WebView
      video.volume = 1.0;
      video.muted = false;
      video.play();

      // Exibe o texto após 1 segundo
      setTimeout(() => {
        texto.style.opacity = 1;
      }, 1000);
    </script>
  </body>
</html>
