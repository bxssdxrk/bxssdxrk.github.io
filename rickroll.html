<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rickroll</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    video {
      max-width: 100%;
      max-height: 80%;
    }

    #texto {
      color: white;
      font-family: sans-serif;
      font-size: 2em;
      margin-top: 20px;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <video id="video" src="video.mp4" autoplay playsinline loop></video>
  <div id="texto">Você foi rickrolled!</div>

  <script>
    const video = document.getElementById('video');
    const texto = document.getElementById('texto');

    // Volume no máximo
    video.volume = 1.0;

    // Mostrar texto após 1 segundo
    setTimeout(() => {
      texto.style.opacity = 1;
    }, 1000);

    // Forçar fullscreen no WebView se suportado
    document.addEventListener('DOMContentLoaded', () => {
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
      }
    });
  </script>

</body>
</html>
