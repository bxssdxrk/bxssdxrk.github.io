<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Rickroll</title>
  <style>
    * {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent; /* Remove highlight azul no mobile */
    }

    body {
      margin: 0;
      background-color: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      cursor: pointer;
    }

    video {
      width: 100%;
      height: auto;
      display: none;
    }

    #texto {
      color: white;
      font-size: 24px;
      margin-top: 20px;
      opacity: 0;
      transition: opacity 0.5s;
    }
  </style>
</head>

<body onclick="iniciar()">

  <video id="video" loop>
    <source src="rickroll.mp4" type="video/mp4">
    Seu navegador não suporta vídeos incorporados.
  </video>

  <div id="texto">Você foi rickrolled!</div>

  <script>
    function iniciar() {
      const video = document.getElementById('video');
      const texto = document.getElementById('texto');

      // Mostra o vídeo
      video.style.display = 'block';

      // Configurações de áudio
      video.volume = 1.0;
      video.muted = false;

      // Inicia o vídeo
      video.play();

      // Mostra o texto depois de 1 segundo
      setTimeout(() => {
        texto.style.opacity = 1;
      }, 1000);

      // Remove o clique após iniciar
      document.body.onclick = null;
    }
  </script>

</body>
</html>
