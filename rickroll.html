<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Rickroll</title>
  <style>
    * {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }body {
  margin: 0;
  background-color: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  cursor: pointer;
}

video {
  width: 100%;
  height: auto;
  display: block;
}

#texto {
  color: white;
  font-size: 24px;
  margin-top: 20px;
  opacity: 0;
  transition: opacity 0.5s;
}

#botao {
  background-color: white;
  color: black;
  border: none;
  padding: 10px 20px;
  font-size: 18px;
  cursor: pointer;
  margin-top: 20px;
}

  </style>
</head><body onclick="iniciar()">  <video id="video" loop muted>
    <source src="video.mp4" type="video/mp4">
    Seu navegador não suporta vídeos incorporados.
  </video>  <div id="texto">Você foi rickrolled!</div>
  <button id="botao">ENTRAR</button>  <script>
    function iniciar() {
      const video = document.getElementById('video');
      const texto = document.getElementById('texto');
      const botao = document.getElementById('botao');

      video.volume = 1.0;
      video.muted = false;
      video.play();

      setTimeout(() => {
        texto.style.opacity = 1;
      }, 1000);

      document.body.onclick = null;
      botao.style.display = 'none';
    }
  </script></body>
</html>
